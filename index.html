    <script>
      (() => {
        const params = new URLSearchParams(window.location.search || "");
        const allowStandalone = params.get("standalone") === "1";
        const forceHostedRedirect = params.get("redirectTest") === "1";
        const hostname = window.location.hostname || "";
        const protocol = window.location.protocol || "";
        const isLoopbackHost = /^(?:127\.0\.0\.1|localhost|::1|\[::1\])$/i.test(hostname);
        const isHostedSurface = forceHostedRedirect || /\.github\.io$/i.test(hostname) || (protocol === "https:" && !isLoopbackHost);

        if (!isHostedSurface || allowStandalone) {
          return;
        }

        const candidatePaths = [
          "../../public/index.html",
          "../../public/",
          "../public/index.html",
          "../public/",
          "/public/index.html",
          "/public/",
          "./public/index.html",
          "./public/"
        ];

        const buildTargetHref = (candidatePath) => {
          const target = new URL(candidatePath, window.location.href);
          const search = new URLSearchParams(target.search || "");
          search.set("static", "1");
          target.search = search.toString();
          target.hash = "#tab=tutorial";
          return target.href;
        };

        const renderFallback = () => {
          const start = () => {
            document.documentElement.style.background = "#f4fbfc";
            document.body.style.margin = "0";
            document.body.style.minHeight = "100vh";
            document.body.style.display = "grid";
            document.body.style.placeItems = "center";
            document.body.style.padding = "24px";
            document.body.style.fontFamily = "Inter, Arial, sans-serif";
            document.body.innerHTML = `
              <main style="width:min(100%,720px);padding:32px;border:1px solid #b9dce5;border-radius:24px;background:rgba(255,255,255,0.96);box-shadow:0 24px 72px rgba(16,32,51,0.12);color:#102033;">
                <p style="margin:0 0 12px;color:#00796f;font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;">Care Nova guide source</p>
                <h1 style="margin:0;font-size:40px;line-height:1.05;">Open the app workspace</h1>
                <p style="margin:16px 0 0;color:#4f6277;font-size:18px;line-height:1.55;">This standalone guide source is not the public app entry point. Open the Care Nova workspace and use the Guide tab there.</p>
                <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;">
                  <a href="../../public/index.html?static=1#tab=tutorial" style="display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 22px;border-radius:999px;background:#00796f;color:#ffffff;font-weight:800;text-decoration:none;">Open Care Nova</a>
                  <a href="../../index.html" style="display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 22px;border-radius:999px;border:1px solid #b9dce5;background:#ffffff;color:#215a88;font-weight:800;text-decoration:none;">Open launcher</a>
                </div>
              </main>
            `;
          };

          if (document.body) {
            start();
            return;
          }

          document.addEventListener("DOMContentLoaded", start, { once: true });
        };

        const resolveHostedApp = async () => {
          for (const candidatePath of candidatePaths) {
            try {
              const probeUrl = new URL(candidatePath, window.location.href);
              const response = await fetch(probeUrl.href, { cache: "no-store" });

              if (!response.ok) {
                continue;
              }

              const contentType = response.headers.get("content-type") || "";
              if (contentType && !/text\/html/i.test(contentType)) {
                continue;
              }

              window.location.replace(buildTargetHref(candidatePath));
              return;
            } catch (error) {
              // Keep checking fallback candidates.
            }
          }

          renderFallback();
        };

        window.__careNovaGuideRedirectPromise = resolveHostedApp();
      })();
    </script>

        },
        {
          section: "Accuracy loop",
          title: "Improve future routing with approved feedback.",
          explain: "Save useful answers, approve feedback, mark missing context, and let local calibration improve route fit.",
          use: "Use this after a good or weak answer.",

          bullets: [

            ["Governed facts", "Feedback improves routing, not medical facts."]
          ],
          quality: "Feedback improves route fit without changing governed medical facts.",
          next: "Approve helpful feedback and add missing context."
        },
        {
          section: "Best workflow",
          title: "Profile, tab, one question, safety, save, summary.",
          explain: "This repeatable loop keeps the model focused, improves memory quality, and makes the output useful after the session.",
          use: "Use this as the daily operating method.",
          enter: "One task",
          check: "Safety first",
          receive: "Saved output",
          bullets: [
            ["Profile", "Confirm the active patient first."],
            ["Ask", "Choose one tab and ask one clear question."],
            ["Save", "Store the useful result and open Summary."]
          ],
          quality: "Repeatable workflow keeps the model focused.",
          next: "Repeat profile, tab, one question, safety, save, and summary."
        },
        {
          section: "Safe close",
          title: "Care Nova educates, organizes, and prepares.",
          explain: "It does not diagnose, prescribe, calculate personal dosage, call emergency services, or replace professional medical care.",
          use: "Keep this boundary visible for every user.",
          enter: "Health question",
          check: "Safety boundary",
          receive: "Prepared next step",
          bullets: [
            ["Education", "Use answers to understand and prepare."],
            ["Organization", "Keep records, summaries, and questions together."],
            ["Real care", "Clinicians and emergency teams make medical decisions."]
          ],
          quality: "Final decisions stay with clinicians and real care teams.",
          next: "Use Care Nova for preparation, then involve qualified care teams."
        }
      ];

      const sceneMount = document.getElementById("sceneMount");
      const totalDuration = chapters.length * sceneDuration;

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[character]);
      }

      function chapterNumber(index) {
        return String(index + 1).padStart(2, "0");
      }

      chapters.forEach((chapter, index) => {
        const number = chapterNumber(index);
        const scene = document.createElement("section");
        scene.id = `s${number}`;
        scene.className = "scene";
        scene.style.zIndex = String(index + 1);
        scene.style.opacity = index === 0 ? "1" : "0";
        scene.innerHTML = `
          <div class="scene-content">
            <div class="scene-left">
              <div class="chapter-label">V24 chapter ${number} / 22 - ${escapeHtml(chapter.section)}</div>
              <h1 class="title">${escapeHtml(chapter.title)}</h1>
              <p class="explain">${escapeHtml(chapter.explain)}</p>
              <div class="use-card">
                <strong>Use when</strong>
                <span>${escapeHtml(chapter.use)}</span>
              </div>
            </div>
            <div class="scene-right">
              <div class="dashboard">
                <div class="window-bar">
                  <span>Enter - Check - Receive</span>
                  <code>${number} / 22</code>
                </div>
                <div class="action-grid">
                  <div class="action-card"><b>Enter</b><span>${escapeHtml(chapter.enter)}</span></div>
                  <div class="action-card"><b>Check</b><span>${escapeHtml(chapter.check)}</span></div>
                  <div class="action-card"><b>Receive</b><span>${escapeHtml(chapter.receive)}</span></div>
                </div>
                <div class="bullet-stack">
                  ${chapter.bullets.map((bullet, bulletIndex) => `
                    <div class="bullet-card">
                      <div class="bullet-index">${bulletIndex + 1}</div>
                      <div><strong>${escapeHtml(bullet[0])}</strong><span>${escapeHtml(bullet[1])}</span></div>
                    </div>
                  `).join("")}
                </div>
                <div class="quality-card">
                  <strong>Quality check</strong>
                  <span>${escapeHtml(chapter.quality)}</span>
                </div>
                <div class="next-ribbon">
                  <strong>Next action</strong>
                  <span>${escapeHtml(chapter.next)}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="scene-number">Tutorial ${number} / 22 - ${String(index * sceneDuration).padStart(3, "0")}s</div>
          <div class="safety-line">Education, organization, and preparation only. Not diagnosis or emergency automation.</div>
        `;
        sceneMount.appendChild(scene);
      });

      window.__timelines = window.__timelines || {};
      const noopTimeline = {
        set() { return this; },
        from() { return this; },
        fromTo() { return this; },
        to() { return this; }
      };
      const tl = window.gsap ? gsap.timeline({ paused: true }) : noopTimeline;

      tl.fromTo(".progress-fill", { scaleX: 0 }, { scaleX: 1, duration: totalDuration, ease: "none", overwrite: "auto" }, 0);

      chapters.forEach((chapter, index) => {
        const number = chapterNumber(index);
        const selector = `#s${number}`;
        const start = index * sceneDuration;

        if (index === 0) {
          tl.set(selector, { opacity: 1, filter: "blur(0px)", scale: 1 }, 0);
        } else {
          const previousSelector = `#s${chapterNumber(index - 1)}`;
          const transitionAt = start - 0.92;
          tl.to(previousSelector, { filter: "blur(18px)", scale: 1.025, opacity: 0, duration: 0.78, ease: "power1.inOut", overwrite: "auto" }, transitionAt);
          tl.fromTo(selector, { opacity: 0, filter: "blur(18px)", scale: 0.985 }, { opacity: 1, filter: "blur(0px)", scale: 1, duration: 0.86, ease: "power2.out", overwrite: "auto" }, transitionAt + 0.12);
        }

        tl.from(`${selector} .chapter-label`, { y: 28, opacity: 0, duration: 0.48, ease: "power3.out", overwrite: "auto" }, start + 0.22);
        tl.from(`${selector} .title`, { x: -48, opacity: 0, duration: 0.72, ease: "expo.out", overwrite: "auto" }, start + 0.42);
        tl.from(`${selector} .explain`, { y: 34, opacity: 0, duration: 0.58, ease: "power2.out", overwrite: "auto" }, start + 0.72);
        tl.from(`${selector} .use-card`, { scale: 0.96, opacity: 0, duration: 0.5, ease: "back.out(1.4)", overwrite: "auto" }, start + 1.0);
        tl.from(`${selector} .dashboard`, { x: 58, opacity: 0, duration: 0.7, ease: "power4.out", overwrite: "auto" }, start + 0.62);
        tl.from(`${selector} .action-card`, { y: 26, opacity: 0, duration: 0.4, stagger: 0.07, ease: "sine.out", overwrite: "auto" }, start + 1.12);
        tl.from(`${selector} .bullet-card`, { y: 22, opacity: 0, duration: 0.38, stagger: 0.065, ease: "power2.out", overwrite: "auto" }, start + 1.38);
        tl.from(`${selector} .quality-card`, { y: 20, opacity: 0, duration: 0.42, ease: "power1.out", overwrite: "auto" }, start + 1.68);
        tl.from(`${selector} .next-ribbon`, { y: 18, opacity: 0, duration: 0.44, ease: "power3.out", overwrite: "auto" }, start + 1.92);
        tl.from(`${selector} .scene-number, ${selector} .safety-line`, { opacity: 0, duration: 0.45, ease: "power1.out", overwrite: "auto" }, start + 1.18);
      });

      tl.to("#s22 .scene-content, #s22 .scene-number, #s22 .safety-line", { opacity: 0, y: -24, duration: 0.72, ease: "power2.inOut", overwrite: "auto" }, totalDuration - 1.05);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
